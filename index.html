<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vorlesefunktion Französisch</title>
</head>

<body style="font-family: Arial; max-width:800px; margin:auto; padding:20px;">

<h1>Vorlesefunktion Französisch</h1>

<textarea id="text" rows="6" style="width:100%;">
Bonjour Madame. Je voudrais réserver une chambre. Est-ce possible ?
</textarea>

<br><br>

<select id="voice"></select>

<br><br>

<label>Geschwindigkeit</label>
<input type="range" id="speed" min="0.6" max="1.3" step="0.1" value="0.9">

<br><br>

<button onclick="start()">▶ Vorlesen</button>
<button onclick="repeat()">↻ Wiederholen</button>
<button onclick="speechSynthesis.pause()">⏸ Pause</button>
<button onclick="speechSynthesis.resume()">▶ Weiter</button>
<button onclick="stop()">■ Stopp</button>

<br><br>

<label>
<input type="checkbox" id="practice">
Übungsmodus (Pause nach jedem Satz)
</label>

<p id="status"></p>

<script>
let voices = [];
let sentences = [];
let lastIndex = 0;
let selectedVoice = null;

function loadVoices() {
  voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith("fr"));
  const select = document.getElementById("voice");
  select.innerHTML = "";

  voices.forEach(v => {
    const option = document.createElement("option");
    option.value = v.name;
    option.textContent = v.name + " (" + v.lang + ")";
    select.appendChild(option);
  });
}

speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function split(text) {
  return text.match(/[^.!?]+[.!?]+|[^.!?]+$/g) || [];
}

function speakSentence(i) {
  if (i >= sentences.length) return;

  const utter = new SpeechSynthesisUtterance(sentences[i]);
  utter.lang = "fr-FR";
  utter.rate = document.getElementById("speed").value;

  // 🔑 FIX: immer dieselbe Stimme verwenden
  if (selectedVoice) {
    utter.voice = selectedVoice;
  }

  lastIndex = i;

  utter.onend = () => {
    if (document.getElementById("practice").checked) {
      document.getElementById("status").innerText = "👉 Jetzt nachsprechen...";
      setTimeout(() => speakSentence(i + 1), 3000);
    } else {
      speakSentence(i + 1);
    }
  };

  speechSynthesis.speak(utter);
}

function start() {
  speechSynthesis.cancel();

  // 🔑 Stimme einmal auswählen und fixieren
  const selectedName = document.getElementById("voice").value;
  selectedVoice = voices.find(v => v.name === selectedName) || voices[0];

  sentences = split(document.getElementById("text").value);
  speakSentence(0);
}

function repeat() {
  speechSynthesis.cancel();
  speakSentence(lastIndex);
}

function stop() {
  speechSynthesis.cancel();
}
</script>

</body>
</html>
